name: "publish"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS일 때만 멀티 아키텍처 타겟 설치
          targets: ${{ matrix.platform == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Pixel Cat Calendar v__VERSION__"
          releaseBody: "모든 Mac(Intel/M1) 및 Windows를 지원하는 업데이트 버전입니다."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }} # 각 플랫폼에 맞는 인자값 적용
