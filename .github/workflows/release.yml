name: "publish"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 최신 노드 버전 사용

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin # 양쪽 아키텍처 모두 설치

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Pixel Cat Calendar v__VERSION__"
          releaseBody: "모든 Mac(Intel/M1/M2) 및 Windows를 지원하는 범용 버전입니다!"
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin # 범용 빌드 옵션 추가
